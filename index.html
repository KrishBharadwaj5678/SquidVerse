   <style>
    :not(:defined) > * {
      display: none;
    }

    model-viewer {
      background-color: #eee;
      overflow-x: hidden;
      width: 100%;
      height: 100vh;
    }

    /* Info icon button */
    #info-icon, #music-icon, #rules-icon, #setting-icon, #youtube-icon, #screenshot-icon{
      position: absolute;
      top: 16px;
      right: 16px;
      background: linear-gradient(135deg, #EB0A62, #C33A6D);  
      color: white;
      font-size: 21px;
      width: 50px;
      height: 50px;
      padding: 10px;
      border: none;
      border-radius: 50%;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }

    #info-icon:hover, #music-icon:hover, #rules-icon:hover, #setting-icon:hover, #screenshot-icon:hover, #youtube-icon:hover  {
      background: linear-gradient(135deg, #CC2C64, #A83E66);
      transform: scale(1.1);
    }

    #music-icon{
      top: 85px;
    }

    #rules-icon{
      top: 153px;
    }

    #setting-icon{
      top: 16px;
      left: 16px;
    }

    #screenshot-icon{
      top: 85px;
      left: 16px;
    }

    #youtube-icon{
      top: 153px;
      left: 16px;
    }

    /* Info Box */
    #info-display {
      position: absolute;
      top: 50px;
      right: 75px;
      color: #333;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      padding: 15px 20px;
      border-radius: 10px;
      box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.2);
      display: none;
      white-space: pre-wrap; 
      animation: fadeIn 0.3s ease-out;
      color: #fff;
      background: linear-gradient(135deg, #E14D6F, #D7325A);
      z-index: 999;
    }

    #info-display h3 {
      margin: 0 0 4px 0;
      font-size: 21px;
      font-weight: 500;
      text-align: center;
    }

    #info-display p {
      margin: 0;
      font-size: 15px;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slider {
      width: 100%;
      text-align: center;
      overflow: hidden;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0px 50px 0px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slides {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      margin-right: 30px;
    }

    .slide {
      scroll-snap-align: start;
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #fff;
      margin-right: 15px;
      border-radius: 5px;
      border: none;
      display: flex;
    }

    .slide.selected {
      border: 3px solid #E9659B;
    }

    div#info-display h3.carname{
     font-size: 22px;
    }

    div#info-display p.carinfo{
     font-size: 17px;
     line-height: 1.6;
    }

    /* Setting */
    #settings-popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); 
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .popup-content {
      background: linear-gradient(135deg, #cc527d, #ea497f);
      padding: 24px 24px 10px 24px;
      border-radius: 18px;
      text-align: center;
      width: 340px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      font-family: "Poppins", sans-serif;
      color: #fff;
    }

    /* Header */
    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .popup-header h3 {
      font-size: 22px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 1px;
      margin-left: 4px;
    }

    .close-icon {
      font-size: 22px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #F75C7E, #EB0A62); 
      padding: 4px 8px;
      border-radius: 50%;
      transition: transform 0.2s, background 0.3s;
    }
    .close-icon:hover {
      transform: scale(1.2);
      background: linear-gradient(135deg, #EB0A62, #C1094F); 
    }

    /* Controls */
    .lighting-control, .shadow-control, .animation-control, .scale-control, .camera-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      background: rgba(255,255,255,0.08); 
      padding: 10px 14px;
      border-radius: 12px;
    }

    .lighting-control label,
    .shadow-control label,
    .scale-control label,
    .camera-control label {
      font-weight: 500;
      color: #ffe6f0; 
    }

    input[type="range"] {
      accent-color: #F75C7E; 
      cursor: pointer;
    }

    .animation-control label {
      font-weight: 500;
      color: #fff;
    }

    .animation-control input[type="checkbox"] {
      transform: scale(1.2);
      accent-color: #F75C7E;
      cursor: pointer;
    }

    /* AR Mode */
    .ar-control {
      border-radius: 12px;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      margin-top: 16px;
    }

    .ar-label {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: #fff;
    }

    .ar-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ar-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .ar-option:hover {
      background: rgba(255,255,255,0.15);
    }

    .ar-option input[type="radio"] {
      accent-color: #F75C7E; 
      transform: scale(1.2);
      cursor: pointer;
    }

    .ar-option span {
      font-size: 15px;
      color: #fff;
    }

    /* AR Button */
    .ar-btn {
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 14px 0;
      border-radius: 6px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #cd1e61, #c9356b);  
      transition: all 0.2s;
    }

    .ar-btn:hover {
      background: linear-gradient(135deg, #cf3569, #d3165b); 
      transform: scale(1.05);
    }

  /* Responsive for Tablets */
  @media (max-width: 730px) {
      model-viewer {
        height: 80vh;
      }

      /* Info box positioning */
      #info-display {
        top: 68px;
        right: 14px;
        font-size: 14px;
        width: 95%;
      }

      /* Info icon size */
      #info-icon, #music-icon, #rules-icon, #setting-icon, #youtube-icon, #screenshot-icon {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      /* Slider button size for smaller screens */
      .slide {
        width: 80px;
        height: 80px;
      }

      /* Adjust slider for smaller screens */
      .slider {
        bottom: 8px;
        margin: 0 20px;
      }

      div#info-display h3.carname{
       font-size: 23px;
      }

     div#info-display p.carinfo{
      font-size: 17px;
     }

    }

  /* Responsive for Mobiles */
  @media (max-width: 480px) {
      model-viewer {
        height: 60vh;
      }

      #info-display {
        top: 66px;
        right: 10px;
        width: 95%;
        font-size: 12px;
      }

      #info-icon, #music-icon, #rules-icon, #setting-icon, #youtube-icon, #screenshot-icon {
        width: 45px;
        height: 45px;
        font-size: 17px;
      }

      .slide {
        width: 70px;
        height: 70px;
        margin-right: 10px;
      }

      .slider {
        bottom: 10px;
        margin: 0 18px;  
      }

      div#info-display h3.carname{
       font-size: 22px;
      }

      div#info-display p.carinfo{
       font-size: 16px;
      }

  }

  </style>
</head>

<script type="module">
const modelViewer = document.querySelector("model-viewer");
const infoBtn = document.getElementById("info-icon");
const infoDisplay = document.getElementById("info-display");
const musicBtn = document.getElementById("music-icon");
const rulesBtn = document.getElementById("rules-icon");
const settingBtn = document.getElementById("setting-icon");
const youtubeBtn = document.getElementById("yt-video");

const popup = document.getElementById("settings-popup");
const closeBtn = document.getElementById("close-popup");

const scaleSlider = document.getElementById("scaleSlider");
const scaleValue = document.getElementById("scaleValue");

const cameraSlider = document.getElementById("cameraSlider");
const cameraValue = document.getElementById("cameraValue");

const lightingSlider = document.getElementById("exposureSlider");
const lightingValue = document.getElementById("exposureValue");

const shadowSlider = document.getElementById("shadowSlider");
const shadowValue = document.getElementById("shadowValue");

const arRadios = document.querySelectorAll("input[name='arMode']");
const animation = document.getElementById("animation");

const screenshotBtn = document.getElementById("screenshot-icon");

const arBtn = document.querySelector(".ar-btn");

// Activate AR
arBtn.addEventListener("click",() => {
  modelViewer.activateAR();
})

// Open popup
settingBtn.addEventListener("click", () => {
  popup.style.display = "flex";
  });

// Close popup
closeBtn.addEventListener("click", () => {
  popup.style.display = "none";
});

// Update Scaling
scaleSlider.addEventListener("input", () => {
  modelViewer.setAttribute("scale",`${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
  scaleValue.textContent = scaleSlider.value;
});

// Update Camera
cameraSlider.addEventListener("input", () => {
  modelViewer.setAttribute("camera-orbit", `180deg auto ${cameraSlider.value}m`);
  cameraValue.textContent = cameraSlider.value;
});

// Update Lighting
lightingSlider.addEventListener("input", () => {
  modelViewer.setAttribute("exposure",lightingSlider.value);
  lightingValue.textContent = lightingSlider.value;
});

// Update Shadow
shadowSlider.addEventListener("input", () => {
  modelViewer.setAttribute("shadow-intensity",shadowSlider.value);
  shadowValue.textContent = shadowSlider.value;
});

// Set AR Mode
arRadios.forEach(radio => {
  radio.addEventListener("change",()=>{
    modelViewer.setAttribute("ar-modes",radio.value);
  })
})

// Animation Control
animation.addEventListener("change",() => {
  if(animation.checked){
    modelViewer.play();
  }else{
    modelViewer.pause();
  }
})

// Screenshot + Share Feature 
screenshotBtn.addEventListener("click",() => {
  if(modelViewer.toDataURL){
    let dataURL = modelViewer.toDataURL("image/png");
    let link = document.createElement("a");
    link.href = dataURL;
    link.download = "Squidverse.png";
    link.click();

    // Convert DataURL -> Blob
    fetch(dataURL).then(res => res.blob()).then(blob => {
      let file = new File([blob], "Squidverse.png",{type:"image/png"});
      if(navigator.share){
        navigator.share({
          files: [file],
          title: "Don’t miss this! 👀",
          text: "Check out this cool snapshot!"
        }).catch(err => console.error("Share failed:",err));
      } else{
        alert("Sharing not supported on this browser.");
      }
    })
  }
})

    description: "• The stairs, or the main game hall, is a location in Squid Game. \n• It is where the players are transported to the games by ascending the staircases.",
    music: "./sounds/Staircase.mp3",
    orbit: "auto auto 1m",
    rules: "",
    ytlink: "",
    lighting: "0.6"
  },
};

// Load this initially
let gameMusic = new Audio();
let rulesMusic = new Audio();
gameMusic.src = infoText["Red Light"].music;
rulesMusic.src = infoText["Red Light"].rules;
let currentGameName = "Red Light";

// Toggle info display with GSAP animation
infoBtn.addEventListener("click", () => {
  if (infoDisplay.style.display === "none" || !infoDisplay.style.display) {
    infoDisplay.style.display = "block"; 
    infoDisplay.innerHTML = `<h3 class='carname'">${infoText[currentGameName].title}</h3><p class="carinfo">${infoText[currentGameName].description}</p>`;
    gsap.fromTo(
      infoDisplay,
      { y: -20, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }
    );
  } else {
    gsap.to(infoDisplay, {
      y: -20,
      opacity: 0,
      duration: 0.5,
      ease: "power3.in",
      onComplete: () => {
        infoDisplay.style.display = "none"; // Hide after animation
      }
    });
  }
});

// Music Icon Switcher
musicBtn.addEventListener('click', function() {
  const icon = this.querySelector('i');
  
  // Toggle between icons
  if (icon.classList.contains('fa-play')) {
      icon.classList.remove('fa-play');
      icon.classList.add('fa-pause');
      gameMusic.play();
  } else if (icon.classList.contains('fa-pause')) {
      icon.classList.remove('fa-pause');
      icon.classList.add('fa-play');
      gameMusic.pause();
  } 
});

// If music ends then show play icon
gameMusic.addEventListener("ended",() => {
  const icon = musicBtn.querySelector('i');
  icon.classList.remove("fa-pause");
  icon.classList.add("fa-play");
})

// Rules Icon
rulesBtn.addEventListener("click",()=>{
  rulesMusic.play();
})

// Switch game model and update
window.switchSrc = (element, foldername, name, carName) => {
  const base = `/${foldername}/${name}`;
  modelViewer.src = base + ".glb";
  modelViewer.poster = base + ".png";
  modelViewer.poster = base + ".png";
  gameMusic.src = infoText[carName].music;
  rulesMusic.src = infoText[carName].rules;
  youtubeBtn.href = infoText[carName].ytlink;
  modelViewer.setAttribute("camera-orbit",infoText[carName].orbit);
  modelViewer.setAttribute("exposure",infoText[carName].lighting);
  lightingValue.textContent = infoText[carName].lighting;
  lightingSlider.value = infoText[carName].lighting;

  // Check that Youtube Link and Rules exists or not
  if(infoText[carName].ytlink ==="" && infoText[carName].rules === ""){
    youtubeBtn.style.display = "none";
    rulesBtn.style.display = "none";
  } else{
    youtubeBtn.style.display = "block";
    rulesBtn.style.display = "block";
  }

  // Switch from pause to play icon
  const icon = musicBtn.querySelector('i');

  icon.classList.remove("fa-play");
  icon.classList.add("fa-pause");
  gameMusic.play();

  currentGameName = carName;
  
  const slides = document.querySelectorAll(".slide");
  slides.forEach((slide) => slide.classList.remove("selected"));
  element.classList.add("selected");

  // If info is visible, animate update
  if (infoDisplay.style.display === "block") {
    gsap.to(infoDisplay, {
      y: -10,
      opacity: 0,
      duration: 0.3,
      ease: "power1.in",
      onComplete: () => {
        infoDisplay.innerHTML = `<h3 class='carname'">${infoText[currentGameName].title}</h3><p class="carinfo">${infoText[currentGameName].description}</p>`;;
        gsap.fromTo(
          infoDisplay,
          { y: 10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.3, ease: "power1.out" }
        );
      }
    });
  }

};

// Prevent XR interaction issues with the slider
document.querySelector(".slider").addEventListener("beforexrselect", (ev) => {
  ev.preventDefault();
});

</script>
</body>
</html>
